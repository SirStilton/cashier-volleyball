<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konto – TSV</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy:  #0d1b3e;
      --navy2: #162244;
      --gold:  #e8c84a;
      --bg:    #f2f2f2;
      --white: #ffffff;
      --text:  #1a1a1a;
      --muted: #777;
      --border:#e0e0e0;
      --red:   #c0392b;
      --green: #27ae60;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--navy);
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header svg { color: var(--gold); flex-shrink: 0; }
    .header-text {}
    .header-brand {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #aab4c8;
    }
    .header-title {
      font-family: 'Merriweather', serif;
      font-size: 17px;
      color: var(--white);
      font-weight: 700;
      margin-top: 1px;
    }

    /* CONTENT */
    .content {
      padding: 20px 16px 40px;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* WELCOME CARD */
    .welcome-card {
      background: var(--navy);
      border-radius: 4px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .avatar {
      width: 46px;
      height: 46px;
      background: rgba(232,200,74,0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--gold);
    }
    .welcome-name {
      font-family: 'Merriweather', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.3;
    }
    .welcome-sub {
      font-size: 12px;
      color: #aab4c8;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* BALANCE CARD */
    .balance-card {
      background: var(--white);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .balance-header {
      background: var(--gold);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .balance-header span {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--navy);
    }
    .balance-body {
      padding: 18px 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
    }
    .balance-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .balance-amount {
      font-family: 'Merriweather', serif;
      font-size: 34px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }
    .balance-amount.clear { color: var(--green); }
    .balance-open-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      text-align: right;
    }
    .balance-open-amount {
      font-family: 'Merriweather', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--red);
      text-align: right;
      line-height: 1;
    }
    .balance-open-amount.clear { color: var(--green); }

    /* TRANSACTION LIST CARD */
    .list-card {
      background: var(--white);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .list-card-header {
      background: var(--navy);
      padding: 11px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .list-card-header span {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--white);
    }
    .list-card-header svg { color: #aab4c8; }

    .tx-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .tx-row:last-child { border-bottom: none; }

    .tx-left { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .tx-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); flex-shrink: 0;
    }
    .tx-dot.paid { background: var(--green); }
    .tx-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }
    .tx-right { text-align: right; flex-shrink: 0; }
    .tx-price {
      font-family: 'Merriweather', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--red);
    }
    .tx-price.paid { color: var(--green); }
    .tx-status {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-top: 1px;
    }

    .tx-empty {
      padding: 28px 18px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* LOADING / ERROR */
    .state-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 14px;
      padding: 40px 20px;
      text-align: center;
    }
    .state-screen svg { color: var(--navy); opacity: 0.4; }
    .state-screen p { font-size: 14px; color: var(--muted); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    <circle cx="12" cy="7" r="4"/>
  </svg>
  <div class="header-text">
    <div class="header-brand">TSV Volleyball</div>
    <div class="header-title">Mein Konto</div>
  </div>
</header>

<!-- LOADING STATE -->
<div class="state-screen" id="stateLoading">
  <div class="spinner"></div>
  <p>Daten werden geladen …</p>
</div>

<!-- ERROR STATE -->
<div class="state-screen" id="stateError" style="display:none">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <p id="errorMsg">Fehler beim Laden.</p>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="mainContent" style="display:none">

  <!-- WELCOME -->
  <div class="welcome-card">
    <div class="avatar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div>
      <div class="welcome-name" id="userName">—</div>
      <div class="welcome-sub" id="userRole">—</div>
    </div>
  </div>

  <!-- BALANCE -->
  <div class="balance-card">
    <div class="balance-header">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
      <span>Kontostand</span>
    </div>
    <div class="balance-body">
      <div>
        <div class="balance-label">Gesamt ausgegeben</div>
        <div class="balance-amount" id="balanceTotal">—</div>
      </div>
      <div>
        <div class="balance-open-label">Noch offen</div>
        <div class="balance-open-amount" id="balanceOpen">—</div>
      </div>
    </div>
  </div>

  <!-- TRANSACTION LIST -->
  <div class="list-card">
    <div class="list-card-header">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/>
      </svg>
      <span>Letzte Käufe</span>
    </div>
    <div id="txList"></div>
  </div>

</div>

<script>
(async () => {

  const client = window.supabase.createClient(
    "https://qsztlpmeadcizgiaotxh.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzenRscG1lYWRjaXpnaWFvdHhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzMwODQsImV4cCI6MjA5MjcwOTA4NH0.kz8evFx2deZJMgHH77IawmUW2rlv84hBRIcA3Eix8B4"
  );

  function fmt(v) { return Number(v).toFixed(2).replace(".", ",") + "\u00a0\u20ac"; }

  function showError(msg) {
    document.getElementById("stateLoading").style.display = "none";
    document.getElementById("stateError").style.display = "flex";
    document.getElementById("errorMsg").textContent = msg;
  }

  function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" })
      + ", " + d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
  }

  const params = new URLSearchParams(window.location.search);
  const userId = params.get("id");
  if (!userId) { showError("Keine Nutzer-ID angegeben."); return; }

  // Nutzer laden
  const { data: user, error: userErr } = await client.from("users").select("*").eq("id", userId).single();
  if (userErr || !user) { showError("Nutzer nicht gefunden."); return; }

  // Produkte & Transaktionen nur für normale Nutzer laden
  let productMap = {}, tx = [], totalAll = 0, totalOpen = 0;
  if (user.role !== "superuser") {
    const { data: products } = await client.from("products").select("*");
    (products || []).forEach(p => { productMap[p.barcode] = p.name; });
    const { data: txData } = await client
      .from("transactions").select("*")
      .eq("user_id", userId).order("created_at", { ascending: false });
    tx = txData || [];
    totalAll  = tx.reduce((s, t) => s + Number(t.price), 0);
    totalOpen = tx.filter(t => !t.paid).reduce((s, t) => s + Number(t.price), 0);
  }

  // UI befüllen
  document.getElementById("userName").textContent = user.name;
  document.getElementById("userRole").textContent = user.role;

  const isSuperuser = user.role === "superuser";

  const totalEl = document.getElementById("balanceTotal");
  const openEl  = document.getElementById("balanceOpen");

  if (isSuperuser) {
    // Kontostand-Karte komplett ersetzen
    document.querySelector(".balance-card").innerHTML = `
      <div class="balance-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
        </svg>
        <span>Kontostand</span>
      </div>
      <div style="padding:20px 18px; display:flex; align-items:center; gap:12px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="1.8">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <div>
          <div style="font-family:'Merriweather',serif; font-size:16px; font-weight:700; color:#27ae60;">Superuser – keine Abrechnung</div>
          <div style="font-size:12px; color:var(--muted); margin-top:3px;">Dieses Konto wird nicht belastet.</div>
        </div>
      </div>
    `;
    document.querySelector(".list-card").innerHTML = `
      <div class="list-card-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <span>Letzte Käufe</span>
      </div>
      <div class="tx-empty">Superuser haben keine Transaktionen.</div>
    `;
  } else {
    totalEl.textContent = fmt(totalAll);
    openEl.textContent  = fmt(totalOpen);
    if (totalOpen <= 0) { openEl.classList.add("clear"); totalEl.classList.add("clear"); }

    const list = document.getElementById("txList");
    if (!tx || tx.length === 0) {
      list.innerHTML = '<div class="tx-empty">Keine Käufe vorhanden.</div>';
    } else {
      tx.slice(0, 20).forEach(t => {
        const name = productMap[t.product_barcode] || "Unbekanntes Produkt";
        const paid = !!t.paid;
        const row = document.createElement("div");
        row.className = "tx-row";
        row.innerHTML = `
          <div class="tx-left">
            <div class="tx-dot${paid ? " paid" : ""}"></div>
            <div>
              <div class="tx-name">${name}</div>
              <div class="tx-date">${formatDate(t.created_at)}</div>
            </div>
          </div>
          <div class="tx-right">
            <div class="tx-price${paid ? " paid" : ""}">-${fmt(t.price)}</div>
            <div class="tx-status">${paid ? "bezahlt" : "offen"}</div>
          </div>
        `;
        list.appendChild(row);
      });
    }
  }

  // Anzeigen
  document.getElementById("stateLoading").style.display = "none";
  document.getElementById("mainContent").style.display = "flex";

})();
</script>

</body>
</html>
